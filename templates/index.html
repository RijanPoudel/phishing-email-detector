<!DOCTYPE html>
<html>

<head>
    <title>Phishing Email Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            max-width: 900px;
            margin: auto;
            padding: 30px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #1e1e1e;
        }

        .safe {
            color: #4caf50;
        }

        .danger {
            color: #ff4d4d;
        }
    </style>
</head>

<body>

    <h1>🛡️ Phishing Email Detector</h1>

    <textarea id="emailText" placeholder="Paste email content here..."></textarea>

    <br>

    <button onclick="scanEmail()">Analyze Email</button>

    <div id="result" class="result" style="display:none;"></div>

    <script>
        async function scanEmail() {

            let text = document.getElementById("emailText").value;

            let response = await fetch("/scan", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    text: text
                })
            });

            let data = await response.json();

            let resultDiv = document.getElementById("result");

            resultDiv.style.display = "block";

            let status = data.phishing
                ? "<span class='danger'>🚨 PHISHING DETECTED</span>"
                : "<span class='safe'>✅ LEGITIMATE EMAIL</span>";

            resultDiv.innerHTML = `
        <h2>${status}</h2>
        <p><b>Confidence:</b> ${data.confidence}%</p>
        <p><b>URLs Found:</b> ${data.url_count}</p>
        <p><b>Keywords:</b> ${data.keywords_detected.join(", ")}</p>
    `;
        }
    </script>

</body>

</html>
